name: CI Build

on:
  push:
    branches:
      - 'master'
      - 'sync-matheo-release'
      - 'CI-Test'
  pull_request:
  # Manual trigger to validate / build a specific slice. Push/PR runs leave
  # os_filter empty, so _build.yaml's default "all" builds all six native
  # targets: Linux/Windows/macOS x86_64 and Linux/Windows/macOS ARM64.
  workflow_dispatch:
    inputs:
      os_filter:
        description: "Platform filter"
        required: false
        type: choice
        default: all
        options:
          - all
          - x86
          - linux
          - linux-arm
          - windows
          - windows-arm
          - arm
          - macos
          - macos-arm
          - macos-x86
          - android
  # Cross-platform-parity safety net: CI compiles the active branch across
  # Linux, Windows, and macOS on both x86_64 and ARM64 (the matrix is defined
  # in _build.yaml under os_filter=all). Any architecture/OS-specific break
  # gets flagged at push/PR time instead of surfacing during manual native
  # testing much later.

permissions:
  contents: read

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      stamp: ${{ steps.stamp.outputs.value }}
    steps:
      - name: Compute build stamp
        id: stamp
        run: echo "value=$(date -u +'%Y%m%d-%H%M')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    uses: ./.github/workflows/_build.yaml
    with:
      publish_mode: artifact
      version_label: ${{ needs.meta.outputs.stamp }}
      # Empty on push/PR -> _build.yaml defaults to "all"; set on manual runs.
      os_filter: ${{ inputs.os_filter || 'all' }}
    secrets:
      ASSETS_TOKEN: ${{ secrets.ASSETS_TOKEN }}
      PRIVATE_SUBMODULES_TOKEN: ${{ secrets.PRIVATE_SUBMODULES_TOKEN }}
      TMC_DISCORD_APP_ID: ${{ secrets.TMC_DISCORD_APP_ID }}
      ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
