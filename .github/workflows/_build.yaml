name: _build

on:
  workflow_call:
    inputs:
      publish_mode:
        description: "artifact for CI artifacts, release for tag artifacts"
        required: true
        type: string
      version_label:
        description: "Date+SHA label (CI) or tag name (release)"
        required: true
        type: string
      os_filter:
        description: "all | x86 | arm | linux | linux-arm | windows | windows-arm | macos | macos-arm | macos-x86 | android — restrict build matrix"
        required: false
        type: string
        default: all
    secrets:
      ASSETS_TOKEN:
        required: false
      PRIVATE_SUBMODULES_TOKEN:
        required: false
      TMC_DISCORD_APP_ID:
        required: false
      ANDROID_KEYSTORE_B64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false

jobs:
  # Compute the build matrix dynamically so callers can opt into a Linux-only
  # or Windows-only release without redefining the runner list. Keeps the
  # matrix definition in one place (this job's shell) instead of forcing
  # every consumer to know the matrix shape.
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      desktop: ${{ steps.compute.outputs.desktop }}
    steps:
      - id: compute
        shell: bash
        env:
          OS_FILTER: ${{ inputs.os_filter }}
        run: |
          # Use Ubuntu 22.04 (glibc 2.35) so the Linux binary runs on
          # older distros — Nobara 43, Fedora 43, Kubuntu 25.10. Building
          # on ubuntu-latest pins glibc 2.43+ which excludes most users.
          linux='{"runner":"ubuntu-22.04","os_name":"linux","arch":"x86_64","region":"multi","flag":"--usa","exe_name":"tmc_pc","extractor_name":"asset_extractor"}'
          # Linux ARM64 (aarch64) via GitHub's native arm64 runner. Same
          # ubuntu-22.04 glibc-2.35 baseline as x86_64. In "all": the
          # C/C++ is ARM-clean (macOS arm64 already ships) and the apt +
          # build.py path is arch-neutral on a native runner.
          linux_arm='{"runner":"ubuntu-22.04-arm","os_name":"linux","arch":"arm64","region":"multi","flag":"--usa","exe_name":"tmc_pc","extractor_name":"asset_extractor"}'
          # Pin to windows-2022: GitHub rolled `windows-latest` to Server
          # 2025 with a different VS/MinGW tooling layout, which broke
          # xmake-repo's libpng install step (exit 127 at the post-compile
          # install). The v0.1.6.x release built fine on windows-2022.
          windows='{"runner":"windows-2022","os_name":"windows","arch":"x86_64","region":"multi","flag":"--usa","exe_name":"tmc_pc.exe","extractor_name":"asset_extractor.exe"}'
          # Windows ARM64 (aarch64) via the native windows-11-arm runner +
          # llvm-mingw (dedicated install step). In "all": validated green
          # (the x86 MinGW path — choco gcc, -mno-ms-bitfields, libgomp —
          # doesn't apply, so it uses aarch64 clang + -static; OpenMP is
          # degraded to serial there). Also reachable via os_filter
          # windows-arm or arm.
          windows_arm='{"runner":"windows-11-arm","os_name":"windows","arch":"arm64","region":"multi","flag":"--usa","exe_name":"tmc_pc.exe","extractor_name":"asset_extractor.exe"}'
          # macos-14 = Apple Silicon arm64; macos-15-intel = Intel x86_64.
          # Use the explicit Intel label: older Intel image aliases can remain
          # queued indefinitely once GitHub-hosted runner capacity/labels move.
          # Both keep os_name="macos" so the brew dep-install step's condition
          # (`matrix.os_name == 'macos'`) covers both runners. Archive name uses
          # ${matrix.arch} to disambiguate the assets.
          macos_arm='{"runner":"macos-14","os_name":"macos","arch":"arm64","region":"multi","flag":"--usa","exe_name":"tmc_pc","extractor_name":"asset_extractor"}'
          macos_x86='{"runner":"macos-15-intel","os_name":"macos","arch":"x86_64","region":"multi","flag":"--usa","exe_name":"tmc_pc","extractor_name":"asset_extractor"}'
          # Full release/CI coverage is six native hosted targets:
          #   x86_64: Linux, Windows, macOS Intel
          #   arm64:  Linux, Windows, macOS Apple Silicon
          # macOS Intel can queue longer than Apple Silicon, but include it in
          # "all" so tagged releases always ship the complete platform set.
          # os_filter=android builds only the APK job below — the desktop
          # matrix is skipped via the `desktop` output (an empty include
          # array would fail the matrix expansion, so gate the job instead).
          desktop=true
          case "${OS_FILTER:-all}" in
            linux)       matrix="{\"include\":[$linux]}" ;;
            linux-arm)   matrix="{\"include\":[$linux_arm]}" ;;
            windows)     matrix="{\"include\":[$windows]}" ;;
            windows-arm) matrix="{\"include\":[$windows_arm]}" ;;
            x86)         matrix="{\"include\":[$linux,$windows,$macos_x86]}" ;;
            arm)         matrix="{\"include\":[$linux_arm,$windows_arm,$macos_arm]}" ;;
            macos)       matrix="{\"include\":[$macos_x86,$macos_arm]}" ;;
            macos-arm)   matrix="{\"include\":[$macos_arm]}" ;;
            macos-x86)   matrix="{\"include\":[$macos_x86]}" ;;
            android)     matrix="{\"include\":[$linux]}"; desktop=false ;;
            all|"")      matrix="{\"include\":[$linux,$linux_arm,$windows,$windows_arm,$macos_x86,$macos_arm]}" ;;
            *)           echo "::error::unknown os_filter: $OS_FILTER (expected: all, x86, arm, linux, linux-arm, windows, windows-arm, macos, macos-arm, macos-x86, android)"; exit 1 ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "desktop=$desktop" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.region }} on ${{ matrix.os_name }} ${{ matrix.arch }}
    needs: set-matrix
    if: needs.set-matrix.outputs.desktop == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
      - name: Disable CRLF conversion
        shell: bash
        run: |
          # Windows runners default to core.autocrlf=true, which converts
          # checked-out text files to CRLF. Force LF on every platform so the
          # source tree (incl. the vendored port/ppu/ PPU) is byte-identical
          # across runners — a no-op where the default is already LF.
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
          clean: false
          persist-credentials: false
      - name: Checkout submodules
        shell: bash
        env:
          SUBMODULES_TOKEN: ${{ secrets.PRIVATE_SUBMODULES_TOKEN }}
        run: |
          if [ -n "$SUBMODULES_TOKEN" ]; then
            # Authenticated path — rewrites github.com URLs to use the
            # PAT so private submodules work alongside public ones.
            url_cfg="url.https://x-access-token:${SUBMODULES_TOKEN}@github.com/.insteadOf"
            git -c "$url_cfg=https://github.com/" -c "$url_cfg=https://github.com" \
                -c "$url_cfg=git@github.com:" -c "$url_cfg=ssh://git@github.com/" \
                submodule sync --recursive
            git -c "$url_cfg=https://github.com/" -c "$url_cfg=https://github.com" \
                -c "$url_cfg=git@github.com:" -c "$url_cfg=ssh://git@github.com/" \
                submodule update --init --recursive --depth 1 || true
          else
            # No token (forks): try a plain init so any public submodule
            # still gets fetched. Each submodule is initialised
            # individually so one private/missing entry doesn't take
            # down the rest. The critical submodule (VirtuaAPU) is checked
            # explicitly after the loop and the step fails only if it is
            # missing. (The software PPU is now vendored in-tree at port/ppu.)
            git submodule sync --recursive || true
            git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | \
              awk '{print $2}' | while read -r p; do
                echo "::group::submodule $p"
                git submodule update --init --recursive --depth 1 -- "$p" || \
                  echo "::warning::failed to fetch submodule $p — continuing"
                echo "::endgroup::"
              done
            if [ ! -d libs/VirtuaAPU/src ]; then
              echo "::error::libs/VirtuaAPU is empty after submodule init — build cannot proceed."
              exit 1
            fi
            if [ ! -d port/ppu/src ]; then
              echo "::error::port/ppu/src missing — the in-tree software PPU is absent."
              exit 1
            fi
          fi

      - name: Install Linux dependencies
        if: ${{ matrix.os_name == 'linux' }}
        run: |
          sudo apt-get update
          # libasound2-dev / libpulse-dev / libpipewire-0.3-dev: needed
          # for SDL3 to compile in alsa + pulseaudio + pipewire audio
          # backends. The 'Verify SDL3 audio backends' step at the end
          # of this job will hard-fail the build if any of those three
          # strings is missing from the produced tmc_pc binary.
          # libegl-dev / libgles-dev (GLVND): build.py enables --gpu_renderer=y
          # (also the xmake default), so tmc_pc links -lEGL -lGLESv2 for the
          # GLES compute PPU rasterizer on Linux (xmake.lua guard). Without the
          # -dev symlinks the link fails with "cannot find -lEGL".
          sudo apt-get install -y \
            curl libpng-dev libfmt-dev nlohmann-json3-dev \
            libx11-dev libxext-dev libxrender-dev libxcursor-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            xutils-dev xorg-dev autoconf automake libtool ninja-build python3-pip \
            libegl-dev libgles-dev
          # Ubuntu 22.04 ships meson 0.61.2, but Wayland 1.25.0 (pulled
          # in transitively by xmake's SDL3 dep chain) needs >= 0.64.
          # Install a newer meson via pip ahead of xmake so the package
          # build doesn't fail with "Meson version is 0.61.2 but project
          # requires >= 0.64.0".
          sudo pip3 install --upgrade 'meson>=1.4'

      - name: Install macOS dependencies
        if: matrix.os_name == 'macos'
        # build.py's dep-probe wants fmt + nlohmann-json reachable via
        # pkg-config; libomp covers the OpenMP runtime ViruaPPU uses for
        # scanline parallelism. The hosted macos-14 / macos-13 runners
        # come with Homebrew, libpng, and the Xcode CLT preinstalled.
        run: brew install fmt nlohmann-json libomp

      - name: Install MinGW Windows
        if: ${{ matrix.os_name == 'windows' && matrix.arch != 'arm64' }}
        shell: powershell
        run: |
          choco install mingw -y --no-progress

          $candidates = @(
            "C:\ProgramData\mingw64\mingw64\bin",
            "C:\ProgramData\mingw64\bin",
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\mingw64\bin",
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin",
            "C:\tools\mingw64\bin"
          )

          $mingw = $null
          foreach ($path in $candidates) {
            if (Test-Path "$path\gcc.exe") {
              $mingw = $path
              break
            }
          }

          if ($null -eq $mingw) {
            Write-Host "Known MinGW paths not found, searching gcc.exe..."
            $gcc = Get-ChildItem -Path "C:\ProgramData" -Filter gcc.exe -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "mingw.*\\bin\\gcc\.exe$" } |
              Select-Object -First 1

            if ($null -ne $gcc) {
              $mingw = Split-Path $gcc.FullName
            }
          }

          if ($null -eq $mingw) {
            Write-Error "MinGW gcc.exe not found"
            exit 1
          }

          Write-Host "Using MinGW from: $mingw"
          echo $mingw | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$mingw;$env:PATH"

          # Export MINGW_HOME (parent of bin/) so the next step's
          # "Resolve MinGW POSIX path" can convert it to the POSIX form
          # that xmake's --mingw flag expects. Without this, xmake
          # auto-detects Git for Windows's bundled MinGW which has no
          # `ar` and fails imgui/libpng install with
          # 'error: cannot get program for ar'.
          $mingwHome = Split-Path $mingw -Parent
          echo "MINGW_HOME=$mingwHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          gcc --version
          g++ --version

      - name: Install llvm-mingw (Windows ARM64)
        if: ${{ matrix.os_name == 'windows' && matrix.arch == 'arm64' }}
        shell: powershell
        run: |
          # The x86 choco-MinGW path (gcc, libgomp, -mno-ms-bitfields) doesn't
          # apply to aarch64. llvm-mingw ships a native Windows-ARM64 toolchain
          # (aarch64-w64-mingw32-clang); xmake's `mingw` toolchain selects it
          # from the aarch64- cross-prefix given --mingw=<root> --arch=arm64
          # (wired by build.py via TMC_XMAKE_MINGW + TMC_XMAKE_ARCH).
          $ErrorActionPreference = "Stop"
          # Pinned llvm-mingw release: 20260602 (LLVM 22.1.7), the latest
          # stable tag as of 2026-06. Previously this resolved 'latest' via
          # the GitHub API, which made builds non-reproducible and could
          # break overnight on a new upstream release. Bump deliberately by
          # updating this tag.
          $tag = "20260602"
          $name = "llvm-mingw-$tag-ucrt-aarch64.zip"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$tag/$name"
          Write-Host "Downloading $name"
          $zip = "$env:RUNNER_TEMP\llvm-mingw.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "C:\llvm-mingw" -Force
          $root = (Get-ChildItem "C:\llvm-mingw" -Directory | Select-Object -First 1).FullName
          Write-Host "llvm-mingw root: $root"
          echo "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "MINGW_HOME=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & "$root\bin\aarch64-w64-mingw32-clang.exe" --version

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1
        with:
          # Pinned: xmake `latest` floated to v3.0.9, whose bin2c codegen
          # intermittently aborts with "double free or corruption (out)"
          # (SIGABRT) during parallel shader-blob generation, failing the
          # build nondeterministically. v3.0.8 is the last release before
          # the regression and builds this tree cleanly. Bump deliberately.
          xmake-version: v3.0.8
          # Cache the xmake install itself plus the xmake package cache
          # (libpng/SDL3/fmt/... build artifacts). Keys are scoped per
          # os+arch so llvm-mingw (windows-arm64), choco MinGW
          # (windows-x86_64), and the Linux/macOS GCC/clang package
          # binaries never cross-contaminate.
          actions-cache-folder: '.xmake-cache'
          actions-cache-key: ${{ matrix.os_name }}-${{ matrix.arch }}
          package-cache: true
          package-cache-key: ${{ matrix.os_name }}-${{ matrix.arch }}
          project-path: '.'

      # Single-region build guard. The shipped binary is a fat multi-region
      # build (build.py forces --multi_region=y), which HIDES half-flattened
      # MULTI_REGION guards — an _eu/_jp twin referenced unguarded but defined
      # only under `#ifdef MULTI_REGION` — plus any code that compiles only
      # when the region twins exist. Those silently break the per-region build
      # AND the byte-matching GBA decomp. This compiles a per-region (USA)
      # build (--slim: no ROM/private assets needed) so such breaks fail CI
      # here. Runs before the artifact build, which reconfigures back to
      # multi-region. x86_64-only so it runs once.
      - name: Single-region build guard (Linux)
        if: matrix.os_name == 'linux' && matrix.arch == 'x86_64'
        run: python build.py --usa --slim --single-region

      - name: Probe for ASSETS_TOKEN
        id: probe_assets
        shell: bash
        env:
          T: ${{ secrets.ASSETS_TOKEN }}
        run: |
          if [ -n "$T" ] && [ -n "${{ vars.ASSETS_REPO }}" ]; then
            echo "have_assets=true"  >> "$GITHUB_OUTPUT"
          else
            echo "have_assets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout private assets repository
        if: steps.probe_assets.outputs.have_assets == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.ASSETS_REPO }}
          token: ${{ secrets.ASSETS_TOKEN }}
          path: _assets
          persist-credentials: false

      - name: Copy ROMs into workspace
        if: steps.probe_assets.outputs.have_assets == 'true'
        shell: bash
        run: |
          if [ -f "_assets/baserom.gba" ]; then
            cp _assets/baserom.gba ./baserom.gba
          fi
          if [ -f "_assets/baserom_eu.gba" ]; then
            cp _assets/baserom_eu.gba ./baserom_eu.gba
          fi
          # JP is optional — boots + parity run for it only when present.
          if [ -f "_assets/baserom_jp.gba" ]; then
            cp _assets/baserom_jp.gba ./baserom_jp.gba
          fi
          test -f ./baserom.gba
          test -f ./baserom_eu.gba

      - name: Build selected region (non-interactive, Linux)
        if: matrix.os_name == 'linux' && steps.probe_assets.outputs.have_assets == 'true'
        run: python build.py ${{ matrix.flag }}

      # Guards the gameplay PRNG constants against silent drift. The test is
      # header-only (port_rng.h pulls just <stdint.h>) so it compiles with a
      # bare cc — no xmake, no SDL deps, no ROM, no private assets — which is
      # why it runs on every Linux build regardless of asset availability.
      # A one-character edit to the multiply/rotate constants fails CI here,
      # which would otherwise desync every existing speedrun RNG manip.
      - name: RNG golden-vector regression (Linux)
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          cc -I port -O2 -o /tmp/rng_golden_test port/port_rng_golden_test.c
          /tmp/rng_golden_test

      - name: PPU affine-latch unit test (Linux)
        if: matrix.os_name == 'linux'
        shell: bash
        # Locks the #132 BG2 reference latch (per-scanline HBlank-DMA affine);
        # the safety net for the mode1/mode2 render-loop unification. No ROM needed.
        run: |
          cc -O2 -fopenmp -I port/ppu/include -DMODE1_GBA_WIDTH=240 \
             tools/ppu_affine_test.c port/ppu/src/mode1.c port/ppu/src/virtuappu.c \
             -o /tmp/ppu_affine_test -lm
          /tmp/ppu_affine_test

      - name: Resolve MinGW POSIX path (Windows)
        if: matrix.os_name == 'windows'
        shell: bash
        # build.py reads TMC_XMAKE_MINGW from env and passes
        # `--mingw=$path` to `xmake f`. MINGW_HOME from "Install MinGW
        # Windows" is a Windows path; xmake (Git-Bash) needs the POSIX
        # form, otherwise libpng install fails with "cannot get
        # program for ar" because xmake auto-detects Git for Windows's
        # bundled MinGW (no `ar`).
        run: |
          if [ -n "$MINGW_HOME" ]; then
            MINGW_POSIX=$(cygpath -u "$MINGW_HOME" 2>/dev/null || echo "$MINGW_HOME")
            echo "TMC_XMAKE_MINGW=$MINGW_POSIX" >> "$GITHUB_ENV"
          fi

      - name: Dump xmake package install logs (Windows, always)
        if: always() && matrix.os_name == 'windows'
        shell: bash
        # The libpng install bombs with a generic "install failed!" exit 127;
        # the actual error lives in installdir.failed/logs/install.txt under
        # the xmake package cache and never reaches the workflow output.
        # Run this AFTER configure (which is where the install fires) and
        # BEFORE build, with `if: always()` so it fires on success, failure,
        # AND cancellation — earlier `failure()` gating skipped on cancel.
        run: |
          set +e
          # Hardcoded Git-Bash POSIX path — $LOCALAPPDATA contains backslashes
          # that bash eats during word expansion ("C:\Users\..." becomes
          # "C:Users..." with no separators), so find returns mangled paths
          # and cat fails. The previous version got that exact error.
          base="/c/Users/runneradmin/AppData/Local/.xmake/cache/packages"
          if [ ! -d "$base" ] && command -v cygpath >/dev/null 2>&1; then
            base=$(cygpath -u "$LOCALAPPDATA")/.xmake/cache/packages
          fi
          echo "Scanning for install logs under $base"
          if [ ! -d "$base" ]; then echo "(directory does not exist)"; exit 0; fi
          # Walk every failed package dir; install.txt was empty in the prior
          # iteration so dump every file under logs/, list the dir tree, and
          # also dump xmake's own session log if present.
          find "$base" -name 'installdir.failed' -type d 2>/dev/null | while read -r faildir; do
            echo
            echo "===== TREE $faildir ====="
            ls -la "$faildir/" 2>/dev/null
            ls -la "$faildir/logs/" 2>/dev/null
            for f in "$faildir"/logs/*; do
              [ -e "$f" ] || continue
              echo
              echo "----- $f (size=$(stat -c%s "$f" 2>/dev/null || echo ?)) -----"
              cat "$f" 2>/dev/null || true
            done
            echo "===== END $faildir ====="
          done
          # Plus xmake's repo-level session log (also useful when build/install
          # bails before writing the package log)
          for sess in "$HOME/.xmake/buildinfo.txt" "$base/../../../buildinfo.txt"; do
            [ -e "$sess" ] || continue
            echo
            echo "===== SESSION $sess ====="
            cat "$sess"
            echo "===== END SESSION ====="
          done
          true

      - name: Inject Discord App ID (release builds)
        shell: bash
        env:
          TMC_DISCORD_APP_ID: ${{ secrets.TMC_DISCORD_APP_ID }}
        run: |
          # Bake the release-build Discord App ID into discord_app_id.txt
          # so xmake.lua's `if os.isfile("discord_app_id.txt")` branch
          # injects TMC_DISCORD_APP_ID_DEFAULT and Rich Presence works
          # out-of-the-box for end users without them needing to register
          # their own Discord application. The file stays gitignored —
          # forks without the repo secret build without an app ID baked
          # in (their users would still need to set TMC_DISCORD_APP_ID
          # themselves, matching the pre-v0.3.0 behaviour). Same probe
          # pattern as the ASSETS_TOKEN step above — secrets can't be
          # referenced in step-level `if:`, so we bail in bash.
          if [ -z "$TMC_DISCORD_APP_ID" ]; then
            echo "No TMC_DISCORD_APP_ID secret set — Rich Presence will need TMC_DISCORD_APP_ID env at runtime."
            exit 0
          fi
          printf '%s' "$TMC_DISCORD_APP_ID" > discord_app_id.txt
          echo "Discord App ID baked in (${#TMC_DISCORD_APP_ID} chars)."

      - name: Build tmc_pc and asset_extractor (build.py)
        shell: bash
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          # build.py reads these and passes --toolchain=/--mingw= to
          # `xmake f`. TMC_XMAKE_MINGW is exported by the previous step
          # (Windows only).
          TMC_XMAKE_TOOLCHAIN: ${{ matrix.os_name == 'windows' && 'mingw' || '' }}
          # The mingw platform defaults to x86_64 regardless of host, so the
          # Windows-ARM64 job must pass --arch=arm64. Native Linux/macOS arm64
          # runners build for the host arch, so they leave this empty.
          TMC_XMAKE_ARCH: ${{ (matrix.os_name == 'windows' && matrix.arch == 'arm64') && 'arm64' || '' }}
        run: |
          # build.py covers configure (xmake f) + build tmc_pc +
          # build asset_extractor. --slim skips xmake's
          # extract_assets/convert_assets/build_assets steps and the
          # post-compile asset_extractor invocation, all of which need
          # a baserom.gba CI doesn't ship. The binaries themselves
          # don't need ROM data at compile time. The "Prepare artifact"
          # step below pulls the freshly-built tmc_pc + asset_extractor
          # out of build/pc/ along with assets/sounds.json.
          # --usa selects the ASSET/OFFSET BASELINE only: build.py
          # defaults to --multi_region=y, so this is the fat binary that
          # plays USA/EU/JP at runtime (hence the "multi" artifact name).
          python3 build.py --usa --slim

      - name: Dump xmake install logs (Windows, post-build on failure)
        if: failure() && matrix.os_name == 'windows'
        shell: bash
        # The pre-build dump fires before any install attempts, so it
        # never catches the configure-time package install failures
        # that produce the 'Command exited 4294967295' bombs. This
        # second dump runs after the build step on failure only.
        run: |
          set +e
          base="/c/Users/runneradmin/AppData/Local/.xmake/cache/packages"
          if [ ! -d "$base" ] && command -v cygpath >/dev/null 2>&1; then
            base=$(cygpath -u "$LOCALAPPDATA")/.xmake/cache/packages
          fi
          echo "POST-BUILD scan under $base"
          [ -d "$base" ] || { echo "(no package cache dir)"; exit 0; }
          find "$base" -name 'installdir.failed' -type d 2>/dev/null | while read -r faildir; do
            echo "===== TREE $faildir ====="
            ls -la "$faildir/" 2>/dev/null
            ls -la "$faildir/logs/" 2>/dev/null
            for f in "$faildir"/logs/*; do
              [ -e "$f" ] || continue
              echo "----- $f -----"
              cat "$f" 2>/dev/null || true
            done
          done
          true

      - name: Verify SDL3 audio backends linked into tmc_pc (Linux)
        if: matrix.os_name == 'linux'
        shell: bash
        # SDL3's compiled-in audio backends each leave their driver-name as
        # a literal string in the binary (alsa, pulseaudio, pipewire, sndio,
        # jack — same strings the runtime probes via SDL_GetAudioDriver).
        # If any of the three universal Linux backends is missing, the
        # release will be silent for that user-base, so fail the build now
        # rather than after release.
        run: |
          BIN="build/pc/${{ matrix.exe_name }}"
          test -f "$BIN"
          missing=()
          for backend in alsa pulseaudio pipewire; do
            if ! strings "$BIN" | grep -qx "$backend"; then
              missing+=("$backend")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::SDL3 in $BIN missing audio backends: ${missing[*]}"
            echo "Install libasound2-dev / libpulse-dev / libpipewire-0.3-dev before xmake build."
            exit 1
          fi
          echo "OK: SDL3 has alsa + pulseaudio + pipewire compiled in."

      - name: Build and run rando_logic_test (Linux x86_64)
        if: matrix.os_name == 'linux' && matrix.arch == 'x86_64'
        shell: bash
        # Offline randomizer self-test (port/rando/rando_test.c): needs no
        # ROM or assets — it generates seeds against the built-in location
        # table plus an embedded .logic snippet and exits nonzero (with a
        # "rando_test: ..." line on stderr) on any failure. Reuses the
        # xmake configuration build.py already set up.
        run: |
          xmake build -y rando_logic_test
          ./build/pc/rando_logic_test

      - name: Build and run debug_actions_test (Linux x86_64)
        if: matrix.os_name == 'linux' && matrix.arch == 'x86_64'
        shell: bash
        # Headless regression test for the F8 debug-menu action layer
        # (port/port_debug_actions_test.c): asserts the per-item toggle
        # exclusivity + flag/dungeon/stat/bottle helpers against gSave, with
        # minimal engine stubs. Exits nonzero on any failure. Reuses the
        # xmake configuration build.py already set up.
        run: |
          xmake build -y debug_actions_test
          ./build/pc/debug_actions_test

      - name: Smoke test tmc_pc headless (Linux)
        if: matrix.os_name == 'linux'
        shell: bash
        # Boot the freshly built binary with SDL dummy video/audio drivers.
        # CI has no game ROM; the verified no-ROM behavior is: init SDL +
        # renderer + imgui, print "PPU init complete." and "Prelaunch: no
        # ROM yet — waiting for user.", then wait forever — so `timeout`
        # killing it with exit 124 is the success signal. Run from an empty
        # temp dir so a ROM checked out by the assets step can't be picked
        # up. The em-dash line is grepped via its stable ASCII prefix only.
        run: |
          BIN="$PWD/build/pc/${{ matrix.exe_name }}"
          test -f "$BIN"
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          code=0
          timeout 20 env TMC_AUTOPLAY=1 SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy "$BIN" --no-audio > smoke.log 2>&1 || code=$?
          cat smoke.log
          test "$code" = 124
          grep -q "Prelaunch: no ROM yet" smoke.log
          grep -q "PPU init complete" smoke.log
          echo "OK: binary booted headless and parked in prelaunch (killed by timeout as expected)."

      # M7 multi-region runtime gate: the shipped binary is ONE fat build that
      # must boot every retail region. Boot it headless against each available
      # ROM and require the port's success marker ("Entering AgbMain") — this
      # is what turns "multi-region works on the dev box" into "multi-region
      # ships". Uses a scratch cwd per region so config.json / saves / the
      # extracted assets of one region never leak into the next boot; asset
      # self-extraction on first boot is covered by the generous timeout.
      # x86_64-only (one runtime gate is enough; the other legs still smoke-
      # boot the no-ROM path above). JP runs only when the assets repo has
      # baserom_jp.gba.
      - name: Multi-region boot gate (Linux x86_64)
        if: matrix.os_name == 'linux' && matrix.arch == 'x86_64' && steps.probe_assets.outputs.have_assets == 'true'
        shell: bash
        run: |
          BIN="$PWD/build/pc/${{ matrix.exe_name }}"
          test -f "$BIN"
          for rom in baserom.gba baserom_eu.gba baserom_jp.gba; do
            if [ ! -f "$PWD/$rom" ]; then
              echo "skip: $rom not in assets repo"
              continue
            fi
            BOOT_DIR=$(mktemp -d)
            env TMC_BASEROM="$PWD/$rom" TMC_AUTOPLAY=1 \
              SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
              sh -c "cd '$BOOT_DIR' && exec '$BIN' --no-audio" > "$BOOT_DIR/boot.log" 2>&1 &
            pid=$!
            # The game loop never self-exits — poll for the success marker
            # (up to 180 s: first boot self-extracts the region's assets),
            # then kill. Early exit = crash = fail below.
            ok=0
            for i in $(seq 1 180); do
              if grep -q "Entering AgbMain" "$BOOT_DIR/boot.log" 2>/dev/null; then
                ok=1; break
              fi
              if ! kill -0 "$pid" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
            if [ "$ok" != 1 ]; then
              echo "FAIL: $rom never reached AgbMain. Log tail:"
              tail -40 "$BOOT_DIR/boot.log"
              exit 1
            fi
            # A stale/misconfigured SINGLE-region binary also reaches AgbMain
            # (it just plays the wrong data) — require the fat-binary marker
            # so the gate proves what ships is actually multi-region.
            if ! grep -q "multi-region binary" "$BOOT_DIR/boot.log"; then
              echo "FAIL: $rom booted but not as a multi-region binary. Log tail:"
              tail -40 "$BOOT_DIR/boot.log"
              exit 1
            fi
            grep "Active region" "$BOOT_DIR/boot.log" | head -1
            echo "OK: $rom boots to AgbMain (multi-region)."
          done

      # Byte-exact PPU render parity gate (Phase 0 oracle). For each scene in
      # tools/ppu_corpus.txt it captures a deterministic snapshot from a
      # headless run and hashes the render two ways (static mode1/mode2 +
      # end-to-end live frame), comparing against tools/ppu_golden_hashes.txt.
      # The renderer is integer-only (no floating point), so the golden hashes
      # are portable across compilers/CPUs. Guards every PPU change against
      # silent render regressions. x86_64-only (matches the other golden gates;
      # the SIMD-built bench needs AVX2) and needs the private ROMs.
      - name: PPU render parity regression (Linux x86_64)
        if: matrix.os_name == 'linux' && matrix.arch == 'x86_64' && steps.probe_assets.outputs.have_assets == 'true'
        shell: bash
        run: |
          export TMC_PC="$PWD/build/pc/${{ matrix.exe_name }}"
          TMC_REGION=usa TMC_BASEROM="$PWD/baserom.gba" tools/ppu_parity_check.sh
          if [ -f "$PWD/baserom_eu.gba" ]; then
            TMC_REGION=eu TMC_BASEROM="$PWD/baserom_eu.gba" tools/ppu_parity_check.sh
          fi
          if [ -f "$PWD/baserom_jp.gba" ]; then
            TMC_REGION=jp TMC_BASEROM="$PWD/baserom_jp.gba" tools/ppu_parity_check.sh
          fi

      - name: Prepare artifact payload
        shell: bash
        run: |
          BIN_PATH="build/pc/${{ matrix.exe_name }}"
          test -f "$BIN_PATH"

          OUTDIR="artifact"
          mkdir -p "$OUTDIR"
          cp "$BIN_PATH" "$OUTDIR/${{ matrix.exe_name }}"

      - name: Create archive
        shell: bash
        env:
          VERSION_LABEL: ${{ inputs.version_label }}
        run: |
          # Archive name embeds os_name + arch so macos-arm64 and
          # macos-x86_64 (and any future arm64-Linux / arm64-Windows)
          # don't collide on upload. Falls back to "x86_64" when arch is
          # unset for compatibility with older callers. tar is available
          # on every hosted runner (Linux/macOS/Windows since 2019).
          ARCH="${{ matrix.arch }}"
          [ -z "$ARCH" ] && ARCH="x86_64"
          ARCHIVE_BASE="tmc-${{ matrix.region }}-${{ matrix.os_name }}-${ARCH}-${VERSION_LABEL}"
          # Name the single payload file explicitly rather than ".", so tar
          # does not store a leading "./" member that some extractors surface
          # as a phantom top-level "." folder (v0.6 release oversight).
          tar -czf "${ARCHIVE_BASE}.tar.gz" -C artifact "${{ matrix.exe_name }}"
          echo "archive_name=${ARCHIVE_BASE}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.archive_name }}
          path: ${{ env.archive_name }}
          if-no-files-found: error

      # Whole-program ABI gate (GCC LTO -Werror=lto-type-mismatch). Runs last:
      # it force-rebuilds tmc_pc, and set_targetdir pins the binary to build/pc,
      # so it would clobber the shipped binary if run before the artifact is
      # captured. Separate object dir keeps the incremental cache clean.
      - name: Check host cross-translation-unit ABI (Linux x86_64)
        if: matrix.os_name == 'linux' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          xmake f -y -o build/abi-check --pc_lto_type_check=y
          xmake build -r -y tmc_pc

  # Android APK. xmake cross-compiles libmain.so per ABI (arm64-v8a for
  # real devices, x86_64 for Waydroid/ChromeOS/emulators); Gradle only
  # packages the two libs — no externalNativeBuild, jniLibs points at
  # build/android/ (see android/app/build.gradle). Same slim model as the
  # desktop legs: CI has no ROM, the APK self-extracts assets on device
  # from the user's baserom.gba. Runs under os_filter "all" (pushes/PRs
  # compile-guard the NDK build) or "android".
  build-android:
    name: Build multi on android (arm64-v8a + x86_64 APK)
    if: inputs.os_filter == 'all' || inputs.os_filter == 'android' || inputs.os_filter == ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
          clean: false
          persist-credentials: false

      - name: Checkout submodules
        shell: bash
        env:
          SUBMODULES_TOKEN: ${{ secrets.PRIVATE_SUBMODULES_TOKEN }}
        run: |
          # Same fallback pattern as the desktop job: authenticated when the
          # token exists, per-submodule best-effort otherwise, with the
          # critical VirtuaAPU (audio core) checked explicitly.
          if [ -n "$SUBMODULES_TOKEN" ]; then
            url_cfg="url.https://x-access-token:${SUBMODULES_TOKEN}@github.com/.insteadOf"
            git -c "$url_cfg=https://github.com/" -c "$url_cfg=https://github.com" \
                -c "$url_cfg=git@github.com:" -c "$url_cfg=ssh://git@github.com/" \
                submodule sync --recursive
            git -c "$url_cfg=https://github.com/" -c "$url_cfg=https://github.com" \
                -c "$url_cfg=git@github.com:" -c "$url_cfg=ssh://git@github.com/" \
                submodule update --init --recursive --depth 1 || true
          else
            git submodule sync --recursive || true
            git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | \
              awk '{print $2}' | while read -r p; do
                echo "::group::submodule $p"
                git submodule update --init --recursive --depth 1 -- "$p" || \
                  echo "::warning::failed to fetch submodule $p — continuing"
                echo "::endgroup::"
              done
          fi
          if [ ! -d libs/VirtuaAPU/src ]; then
            echo "::error::libs/VirtuaAPU is empty after submodule init — build cannot proceed."
            exit 1
          fi
          if [ ! -d port/ppu/src ]; then
            echo "::error::port/ppu/src missing — the in-tree software PPU is absent."
            exit 1
          fi

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1
        with:
          # Pinned to v3.0.8 — see the desktop Setup xmake step above for why.
          xmake-version: v3.0.8
          actions-cache-folder: '.xmake-cache'
          actions-cache-key: android-apk-v3
          package-cache: true
          package-cache-key: android-apk-v3
          project-path: '.'

      - name: Install pinned Android NDK
        shell: bash
        run: |
          # Pin the NDK the port is developed against (r26d) instead of the
          # runner's preinstalled one, which rolls forward over time and
          # would make APK builds non-reproducible.
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "ndk;26.3.11579264"
          echo "TMC_NDK=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Build libmain.so (arm64-v8a + x86_64)
        shell: bash
        run: |
          # Mirrors the local recipe: multi-region fat build (xmake default),
          # 384px widescreen baseline — the on-device default. Each ABI drops
          # its lib into build/android/<abi>/ where Gradle's jniLibs looks.
          for abi in arm64-v8a x86_64; do
            xmake f -y -p android -a "$abi" --ndk="$TMC_NDK" \
              --game_version=USA --widescreen_width=384
            xmake build -y tmc_pc
            test -f "build/android/$abi/libmain.so"
          done

      - name: Decode release keystore
        shell: bash
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # Same probe pattern as ASSETS_TOKEN — secrets can't gate a
          # step-level `if:`. Without the secret (forks) Gradle falls back
          # to debug signing: still installable, just not upgrade-stable.
          if [ -z "$KS_B64" ]; then
            echo "No ANDROID_KEYSTORE_B64 secret — release APK will be debug-signed."
            exit 0
          fi
          printf '%s' "$KS_B64" | base64 -d > "$RUNNER_TEMP/tmc-release.keystore"
          echo "TMC_KEYSTORE_FILE=$RUNNER_TEMP/tmc-release.keystore" >> "$GITHUB_ENV"
          echo "TMC_KEYSTORE_PASSWORD=$KS_PASS" >> "$GITHUB_ENV"

      - name: Build release APK
        shell: bash
        run: |
          cd android
          export JAVA_HOME="$JAVA_HOME_17_X64"
          ./gradlew --no-daemon :app:assembleRelease

      - name: Verify APK (signature + both ABIs)
        shell: bash
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          test -f "$APK"
          BT=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)
          "$BT/apksigner" verify --print-certs "$APK"
          unzip -l "$APK" | grep -q 'lib/arm64-v8a/libmain.so'
          unzip -l "$APK" | grep -q 'lib/x86_64/libmain.so'
          echo "OK: APK signed and carries both ABIs."

      - name: Name APK artifact
        shell: bash
        env:
          VERSION_LABEL: ${{ inputs.version_label }}
        run: |
          APK_NAME="tmc-multi-android-${VERSION_LABEL}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.apk_name }}
          path: ${{ env.apk_name }}
          if-no-files-found: error
