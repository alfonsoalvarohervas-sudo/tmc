name: Release Build

on:
  push:
    tags:
      - 'v*'
  # Manual trigger so we can cut a Linux-only or Windows-only release
  # (e.g. v0.1.6.2 fixed Linux audio without re-shipping Windows). For a
  # full multi-platform release, just push the tag normally — this
  # dispatch path doesn't push a git tag, so the auto-trigger above
  # won't fire when this is used.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to attach the release to (e.g. v0.1.6.2-experimental). Will be created at HEAD if missing."
        required: true
        type: string
      os_filter:
        description: "Which platform to build for"
        required: true
        type: choice
        default: all
        options:
          - all
          - linux
          - windows
          - macos

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build.yaml
    with:
      publish_mode: release
      # workflow_dispatch supplies inputs.tag; tag-push uses github.ref_name.
      version_label: ${{ inputs.tag || github.ref_name }}
      # tag-push always builds the full matrix (inputs.os_filter is empty
      # under push triggers, _build.yaml's default 'all' kicks in).
      os_filter: ${{ inputs.os_filter || 'all' }}
    secrets:
      ASSETS_TOKEN: ${{ secrets.ASSETS_TOKEN }}
      PRIVATE_SUBMODULES_TOKEN: ${{ secrets.PRIVATE_SUBMODULES_TOKEN }}

  create-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifact files
        shell: bash
        run: |
          mkdir -p uploads
          find release-assets -type f -name '*.tar.gz' -exec cp {} uploads/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "TMC ${{ inputs.tag || github.ref_name }}"
          files: uploads/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
